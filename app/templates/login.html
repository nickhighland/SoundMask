<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% if setup_mode %}Create Admin Password{% else %}Login{% endif %} | SoundMask</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/style.css') }}" />
  </head>
  <body class="auth-page">
    <main class="auth-card">
      <div class="auth-hero">
        <p class="eyebrow">SoundMask</p>
        <h1>{% if setup_mode %}Create admin password{% else %}Sign in{% endif %}</h1>
        <p class="muted">Private local control for a counseling-office sound masking appliance.</p>
      </div>
      {% if error %}<p class="error">{{ error }}</p>{% endif %}
      <form method="post" class="stack">
        <label>
          Password
          <input type="password" name="password" required data-autofocus />
        </label>
        {% if setup_mode %}
        <label>
          Confirm password
          <input type="password" name="password_confirm" required />
        </label>
        {% endif %}
        <button type="submit">{% if setup_mode %}Create password{% else %}Login{% endif %}</button>
      </form>
      <div class="auth-footer">
        <span class="info-pill">Local-only</span>
        <span class="info-pill">Calendar-aware</span>
        <span class="info-pill">Speaker ready</span>
      </div>
    </main>
  </body>
</html>
